# ZephyrOS TLP baseline
#
# TLP ships sane defaults; we only override where ZephyrOS has an opinion.
# Users can layer their own config under /etc/tlp.d/ — later files win.

# Disk — balance between wear and latency. Defaults are fine for SSDs.
DISK_IOSCHED="mq-deadline mq-deadline"

# CPU — use schedutil (kernel default on modern kernels) on battery too,
# with the energy-performance hint biased toward power saving.
CPU_SCALING_GOVERNOR_ON_AC="schedutil"
CPU_SCALING_GOVERNOR_ON_BAT="schedutil"
CPU_ENERGY_PERF_POLICY_ON_AC="balance_performance"
CPU_ENERGY_PERF_POLICY_ON_BAT="power"

# Platform profile — lets firmware pick a thermal envelope where supported.
PLATFORM_PROFILE_ON_AC="balanced"
PLATFORM_PROFILE_ON_BAT="low-power"

# USB autosuspend — avoid breaking common peripherals (mice, keyboards).
USB_AUTOSUSPEND=1
USB_EXCLUDE_AUDIO=1
USB_EXCLUDE_BTUSB=1
USB_EXCLUDE_PHONE=1

# Wi-Fi power saving — on battery only, to preserve latency on AC.
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# Keep charge thresholds blank — these are vendor-specific and risky to
# set globally. Users with supported ThinkPads/Dell/etc. can enable them
# in their own drop-in.
