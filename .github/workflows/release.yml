name: Build and Release ISOs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        edition: [core, scholar, dev, soc, lite]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO (Arch Linux)
        uses: anton-yurchenko/archiso-action@v3
        with:
          # We run our custom build-edition script inside the Arch environment
          command: |
            pacman -Sy --noconfirm git makepkg pacman-contrib
            # build-localrepo needs a non-root user for makepkg
            useradd -m builder
            echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            chown -R builder:builder .
            # Build the edition
            su builder -c "cd build && ./build-edition.sh ${{ matrix.edition }}"
          # The output ISO will be in build/out/
          output: build/out/*.iso

      - name: Upload ISO to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/out/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
