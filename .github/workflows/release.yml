name: Build and Release ISOs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:base
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        edition: [core, scholar, dev, soc, lite]
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm archiso git sudo pacman-contrib

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          # build-localrepo needs a non-root user for makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          # Fix permissions
          chmod +x build/*.sh build/scripts/*.sh
          chown -R builder:builder .
          
          # Build the edition
          su builder -c "cd build && ./build-edition.sh ${{ matrix.edition }}"

      - name: Upload ISO to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/out/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
