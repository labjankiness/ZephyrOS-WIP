# ZephyrOS local repo (generated at build time)
#
# This file is rewritten by: build/scripts/build-localrepo.sh
# It must exist so the profile pacman.conf can Include it.
#
# If the build script has not been run yet, the placeholder server below will
# not work and the ISO build will fail.

[zephyros-local]
SigLevel = Optional TrustAll
Server = file:///__ZEPHYROS_LOCALREPO__
