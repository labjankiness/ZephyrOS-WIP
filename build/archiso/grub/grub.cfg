# ZephyrOS GRUB configuration for live ISO

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video
insmod font

set default="0"
set timeout=5

menuentry "ZephyrOS Live (Wayland)" --class arch --class gnu-linux --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "ZephyrOS Live (TTY only)" --class arch --class gnu-linux --class os {
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% systemd.unit=multi-user.target
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "System shutdown" --class shutdown {
    echo "System shutting down..."
    halt
}

menuentry "System restart" --class restart {
    echo "System restarting..."
    reboot
}
