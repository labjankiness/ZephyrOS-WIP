[core]
plugins = autostart command vswitch move resize grid decoration animate blur alpha idle
preferred_decoration_mode = client
close_top_view = <super> KEY_F4

[output]
mode = 1920x1080@60000
transform = normal
scale = 1.0

[input]
kb_layout = us
kb_options =
cursor_theme = Adwaita
cursor_size = 24

[idle]
toggle = <super> KEY_I
dpms_timeout = 0
screensaver_timeout = 0

[autostart]
background = wf-background
panel = wf-panel-pi
launcher = wofi --show drun

[animate]
open_animation = zoom
close_animation = zoom
duration = 250

[blur]
method = kawase
radius = 8
passes = 3
enabled_for = "panel,background,menu"

[decoration]
title_height = 28
border_size = 1
active_border_color = 40,120,220,255
inactive_border_color = 80,80,80,255
corner_radius = 14

[grid]
slot_blur = true

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[vswitch]
binding_left = <super> KEY_LEFT
binding_right = <super> KEY_RIGHT
binding_up = <super> KEY_UP
binding_down = <super> KEY_DOWN

